# SPDX-License-Identifier: GPL-3.0-or-later
# Tag-driven release: build the binary and publish .deb, .rpm and a tarball.
#   git tag v0.1.0 && git push origin v0.1.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Install packagers
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Build release
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/crosswire

      - name: Build .deb
        run: cargo deb --no-build --output dist/

      - name: Build .rpm
        run: |
          mkdir -p dist
          cargo generate-rpm --output dist/

      - name: Build tarball
        run: |
          v="${GITHUB_REF_NAME#v}"
          d="crosswire-${v}-x86_64-linux"
          mkdir -p "stage/$d"
          cp target/release/crosswire README.md LICENSE "stage/$d/"
          tar -C stage -czf "dist/${d}.tar.gz" "$d"

      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # macOS builds a universal-ish pair (Apple Silicon + Intel): a tarball and an
  # unsigned component .pkg installing crosswire to /usr/local/sbin. The .pkg is
  # not notarized, so Gatekeeper will warn; sign/notarize downstream if needed.
  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: aarch64
            target: aarch64-apple-darwin
          - runner: macos-13   # Intel
            arch: x86_64
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: OpenSSL (Homebrew)
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball + .pkg
        run: |
          set -euo pipefail
          v="${GITHUB_REF_NAME#v}"
          bin="target/${{ matrix.target }}/release/crosswire"
          strip "$bin" || true
          mkdir -p dist

          # Tarball
          d="crosswire-${v}-${{ matrix.arch }}-macos"
          mkdir -p "stage/$d"
          cp "$bin" README.md LICENSE "stage/$d/"
          tar -C stage -czf "dist/${d}.tar.gz" "$d"

          # Unsigned component installer package (installs to /usr/local/sbin)
          root="pkgroot"; mkdir -p "$root/usr/local/sbin"
          cp "$bin" "$root/usr/local/sbin/crosswire"
          pkgbuild --identifier io.astrolab.crosswire --version "$v" \
                   --root "$root" --install-location / \
                   "dist/crosswire-${v}-${{ matrix.arch }}.pkg"

      - name: Checksums
        run: cd dist && shasum -a 256 * > "SHA256SUMS-macos-${{ matrix.arch }}.txt"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
